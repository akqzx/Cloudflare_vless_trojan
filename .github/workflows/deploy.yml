name: Deploy Worker

on:
  push:
    branches:
      - main  # 或者你希望的其他分支

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # 选择所需的 Node.js 版本

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}  # 你的 Cloudflare API Token
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}  # 你的 Cloudflare 账户 ID
        run: npx wrangler deploy _worker.js --compatibility-date $(date +%Y-%m-%d) --name "stash"
