name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main  # 根据你的主分支设置

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'  # 设置 Node.js 版本

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy hhxd Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}  # 从 Secrets 获取 API Token
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}  # 从 Secrets 获取 API Token
        run: npx wrangler deploy Vless_workers_pages/_worker.js --compatibility-date $(date +%Y-%m-%d) --name "stash"

      - name: Deploy 163 Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF163_API_TOKEN }}  # 从 Secrets 获取 API Token
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF163_ACCOUNT_ID }}  # 从 Secrets 获取 API Token
        run: npx wrangler deploy Vless_workers_pages/_worker.js --compatibility-date $(date +%Y-%m-%d) --name "163"

  # Cleanup job to remove old workflow runs
  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get install gh -y

      - name: Cleanup old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List workflow runs and remove all but the latest 5
          gh run list --limit 100 --workflow=Deploy_Cloudflare_Worker \
            | tail -n +6 \
            | awk '{print $1}' \
            | xargs -I % gh run delete % -y
