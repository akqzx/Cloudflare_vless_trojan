name: Deploy Specific File to Cloudflare Workers
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Copy specific file
        run: cp Vless_workers_pages/_worker.js /tmp/specific-file.js
        # 将 <path-to-specific-file> 替换为你指定文件的相对路径，比如 src/special-code.js
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@1.3.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workerName: stash
          modules: true
          entryPoint: /tmp/specific-file.js
