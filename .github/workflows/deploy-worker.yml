name: Deploy to Cloudflare Workers

# 触发条件，这里设置为推送到 main 分支时触发
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # 你可以选择任何支持的 Node.js 版本

      # 更新 Wrangler 到最新版本
      - name: Install and update Wrangler
        run: |
          npm uninstall -g @cloudflare/wrangler || true
          npm install -g wrangler

      # 设置环境变量
      - name: Set up environment variables
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=${CF_API_TOKEN}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT_ID}" >> $GITHUB_ENV

      # 验证登录
      - name: Authenticate with Cloudflare
        run: wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # 发布 Worker
      - name: Deploy Worker
        run: wrangler deploy --script Vless_workers_pages/_worker.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
