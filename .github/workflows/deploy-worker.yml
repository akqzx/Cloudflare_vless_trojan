name: Deploy to Cloudflare Workers
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Copy specific file
        run: cp Vless_workers_pages/_worker.js /tmp/deployed-worker.js
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@latest
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          entryPoint: /tmp/deployed-worker.js
