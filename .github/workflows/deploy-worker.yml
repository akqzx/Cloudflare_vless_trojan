name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main  # 每当推送到 main 分支时触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # 检出代码仓库

      - name: Install Wrangler
        run: npm install -g wrangler  # 安装 wrangler

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy Vless_workers_pages/_worker.js  # 部署指定文件
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}  # 从 GitHub Secrets 获取
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}  # 从 GitHub Secrets 获取
