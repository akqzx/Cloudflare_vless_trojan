name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Volta
      run: curl https://get.volta.sh | bash -e

    - name: Initialize Volta
      run: |
        echo "export VOLTA_HOME=$HOME/.volta" >> $GITHUB_ENV
        echo "export PATH=$PATH:$HOME/.volta/bin" >> $GITHUB_ENV
        echo "volta install node" >> $GITHUB_PATH

    - name: Install Node.js
      run: |
        volta install node

    - name: Authenticate with Cloudflare
      run: |
        echo "//pika.cloudflare.com/:_authToken=${{ secrets.CF_API_TOKEN }}" > ~/.npmrc

    - name: Publish to Cloudflare Workers
      run: |
        npx wrangler kv:namespace create MY_KV_NAMESPACE
        npx wrangler publish --name stash
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
