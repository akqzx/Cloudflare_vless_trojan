name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main  # 监听 main 分支的 push 事件，可以根据需要更改分支名称
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  # 使用 Node.js 版本 14，可以根据需要更改版本

    - name: Install dependencies
      run: npm install

    - name: Authenticate with Cloudflare
      run: npm config set //pika.cloudflare.com/:_authToken "${CF_API_TOKEN}"
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

    - name: Publish to Cloudflare Workers
      run: |
        npx wrangler kv:namespace create MY_KV_NAMESPACE
        npx wrangler publish --name stash
      working-directory: Vless_workers_pages
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
