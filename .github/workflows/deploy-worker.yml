name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Deploy to Cloudflare Workers
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          FILE_CONTENT=$(cat Vless_workers_pages/_worker.js)
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/stash" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -H "Content-Type: application/javascript" \
          --data-binary "@Vless_workers_pages/_worker.js"
